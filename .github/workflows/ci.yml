name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Lint
        run: ruff check src tests
      - name: Test + Coverage
        run: pytest --cov=rag_pipeline --cov-report=term-missing --cov-fail-under=80
      - name: Build backend
        run: python -m build
      - name: Docker build backend
        run: docker build -t rag-pipeline-demo:ci .

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend
        run: npm install
      - name: Lint
        run: npm run lint --if-present
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Install Playwright deps
        run: npx playwright install --with-deps chromium
      - name: E2E
        run: |
          npm run dev &
          sleep 8
          npm run e2e

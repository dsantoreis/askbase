name: cd

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip
      - run: pip install -e '.[dev]'
      - run: ruff check src tests
      - run: pytest -q
      - run: python -m build

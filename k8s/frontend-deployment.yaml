apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-frontend
  namespace: rag-enterprise
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-frontend
  template:
    metadata:
      labels:
        app: rag-frontend
    spec:
      containers:
        - name: web
          image: ghcr.io/owner/rag-pipeline-demo-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: http://rag-backend.rag-enterprise.svc.cluster.local/ask
---
apiVersion: v1
kind: Service
metadata:
  name: rag-frontend
  namespace: rag-enterprise
spec:
  selector:
    app: rag-frontend
  ports:
    - port: 80
      targetPort: 3000

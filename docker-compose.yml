version: "3.9"
services:
  rag-api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./artifacts:/app/artifacts
      - ./docs:/app/docs:ro
      - ./data:/app/data:ro
    command: ["python", "-m", "rag_pipeline.cli", "serve", "--host", "0.0.0.0", "--port", "8080", "--index", "artifacts/rag_index.pkl", "--seed"]
